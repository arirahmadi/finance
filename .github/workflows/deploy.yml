name: Deploy Website using FTP (ZIP Method)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, zip

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Prepare Zip and Unzip Script
      run: |
        # Create unzip.php in root directory
        cat << 'EOF' > unzip.php
        <?php
        $zipFile = __DIR__ . '/project.zip';
        if (file_exists($zipFile)) {
            $zip = new ZipArchive;
            if ($zip->open($zipFile) === TRUE) {
                $zip->extractTo(__DIR__);
                $zip->close();
                echo 'SUCCESS';
                unlink($zipFile);
            } else {
                echo 'ERROR: Failed to open zip';
            }
        } else {
            echo 'ERROR: Zip file not found';
        }
        @unlink(__FILE__);
        if (file_exists(__DIR__ . '/public/unzip.php')) {
            @unlink(__DIR__ . '/public/unzip.php');
        }
        EOF

        # Create unzip.php inside public directory
        mkdir -p public
        cat << 'EOF' > public/unzip.php
        <?php
        $zipFile = __DIR__ . '/../project.zip';
        if (file_exists($zipFile)) {
            $zip = new ZipArchive;
            if ($zip->open($zipFile) === TRUE) {
                $zip->extractTo(__DIR__ . '/../');
                $zip->close();
                echo 'SUCCESS';
                unlink($zipFile);
            } else {
                echo 'ERROR: Failed to open zip';
            }
        } else {
            echo 'ERROR: Zip file not found';
        }
        @unlink(__FILE__);
        if (file_exists(__DIR__ . '/../unzip.php')) {
            @unlink(__DIR__ . '/../unzip.php');
        }
        EOF
        
        # Create the zip archive
        zip -r project.zip . -x ".git*" -x ".github*" -x "node_modules/*" -x "tests/*" -x "phpunit.xml" -x "vite.config.js" -x "package.json" -x "package-lock.json"
        
        # Clean workspace to leave only project.zip, unzip.php and public/unzip.php
        find . -maxdepth 1 ! -name 'project.zip' ! -name 'unzip.php' ! -name 'public' ! -name '.' -exec rm -rf {} +
        find public -maxdepth 1 ! -name 'unzip.php' ! -name 'public' ! -name '.' -exec rm -rf {} +

    - name: Sync ZIP via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: domains/berkahsinergigemilang.com/public_html/finance/

    - name: Execute Unzip via HTTP Request
      run: |
        echo "Executing unzip script on Hostinger..."
        # Try both URLs (subdomain pointed to root vs subdomain pointed to /public)
        RESPONSE=$(curl -s -L --max-time 15 http://finance.berkahsinergigemilang.com/unzip.php)
        if [ "$RESPONSE" != "SUCCESS" ]; then
          echo "Root url failed with response: $RESPONSE"
          echo "Trying public/unzip.php URL..."
          RESPONSE=$(curl -s -L --max-time 15 http://finance.berkahsinergigemilang.com/public/unzip.php)
        fi
        
        echo "Response from server: $RESPONSE"
        if [ "$RESPONSE" = "SUCCESS" ]; then
          echo "Deployment successful!"
        else
          echo "Deployment failed or unzip script could not be executed: $RESPONSE"
          exit 1
        fi
