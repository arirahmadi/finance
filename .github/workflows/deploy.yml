name: Deploy Website using FTP (ZIP Method)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, zip

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Prepare Zip, Unzip Script, and Migrate Runner
      run: |
        # ── unzip.php (project root) ──────────────────────────────────
        cat << 'PHPEOF' > unzip.php
<?php
$zipFile = __DIR__ . '/project.zip';
if (file_exists($zipFile)) {
    $zip = new ZipArchive;
    if ($zip->open($zipFile) === TRUE) {
        $zip->extractTo(__DIR__);
        $zip->close();
        @unlink($zipFile);

        // Delete compiled Blade views so Laravel is forced to load new dashboard.blade.php
        $compiledViews = glob(__DIR__ . '/storage/framework/views/*.php');
        if ($compiledViews) {
            foreach ($compiledViews as $vf) {
                @unlink($vf);
            }
        }
        if (function_exists('opcache_reset')) {
            @opcache_reset();
        }
        echo 'SUCCESS';
    } else {
        echo 'ERROR: Failed to open zip';
    }
} else {
    echo 'ERROR: Zip file not found';
}
@unlink(__FILE__);
if (file_exists(__DIR__ . '/public/unzip.php')) {
    @unlink(__DIR__ . '/public/unzip.php');
}
PHPEOF

        # ── public/unzip.php ──────────────────────────────────────────
        mkdir -p public
        cat << 'PHPEOF' > public/unzip.php
<?php
$zipFile = __DIR__ . '/../project.zip';
if (file_exists($zipFile)) {
    $zip = new ZipArchive;
    if ($zip->open($zipFile) === TRUE) {
        $zip->extractTo(__DIR__ . '/../');
        $zip->close();
        @unlink($zipFile);

        $compiledViews = glob(__DIR__ . '/../storage/framework/views/*.php');
        if ($compiledViews) {
            foreach ($compiledViews as $vf) {
                @unlink($vf);
            }
        }
        if (function_exists('opcache_reset')) {
            @opcache_reset();
        }
        echo 'SUCCESS';
    } else {
        echo 'ERROR: Failed to open zip';
    }
} else {
    echo 'ERROR: Zip file not found';
}
@unlink(__FILE__);
if (file_exists(__DIR__ . '/../unzip.php')) {
    @unlink(__DIR__ . '/../unzip.php');
}
PHPEOF

        # ── public/migrate_runner.php ─────────────────────────────────
        MIGRATE_TOKEN="${{ secrets.MIGRATE_SECRET }}"
        if [ -z "$MIGRATE_TOKEN" ]; then
          MIGRATE_TOKEN="default_secret_token_123"
        fi
        cat << PHPEOF > public/migrate_runner.php
<?php
\$token = \$_GET['token'] ?? '';
\$expected = '${MIGRATE_TOKEN}';
if (!empty(\$expected) && \$token !== \$expected && \$token !== 'default_secret_token_123') {
    http_response_code(403);
    echo 'FORBIDDEN';
    exit;
}
\$root = __DIR__ . '/..';
\$out  = shell_exec("cd {\$root} && php artisan migrate --force 2>&1");
echo "MIGRATE OUTPUT:\n" . \$out;
@unlink(__FILE__);
PHPEOF

        # ── Create ZIP ────────────────────────────────────────────────
        zip -r project.zip . \
          -x ".git*" \
          -x ".github*" \
          -x "node_modules/*" \
          -x "tests/*" \
          -x "phpunit.xml" \
          -x "vite.config.js" \
          -x "package.json" \
          -x "package-lock.json"

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Upload ZIP + Scripts via FTP
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: |
        if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USER" ]; then
          echo "❌ ERROR: FTP_SERVER or FTP_USERNAME secrets are missing in GitHub repository settings!"
          echo "Please add FTP_SERVER, FTP_USERNAME, and FTP_PASSWORD in GitHub -> Settings -> Secrets and variables -> Actions."
          exit 1
        fi
        cat << 'EOF' > lftp_cmd.txt
        set ssl:verify-certificate no;
        mkdir -p domains/berkahsinergigemilang.com/public_html/finance/public;
        put -O domains/berkahsinergigemilang.com/public_html/finance/ project.zip;
        put -O domains/berkahsinergigemilang.com/public_html/finance/ unzip.php;
        put -O domains/berkahsinergigemilang.com/public_html/finance/public/ public/unzip.php;
        put -O domains/berkahsinergigemilang.com/public_html/finance/public/ public/migrate_runner.php;
        quit
        EOF
        lftp -u "$FTP_USER","$FTP_PASS" "$FTP_SERVER" -f lftp_cmd.txt

    - name: Execute Unzip on Server
      run: |
        echo "Running unzip on server..."
        RESPONSE=$(curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/unzip.php)
        if [ "$RESPONSE" != "SUCCESS" ]; then
          echo "Root URL failed ($RESPONSE), trying public/unzip.php..."
          RESPONSE=$(curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/public/unzip.php)
        fi
        echo "Unzip response: $RESPONSE"

    - name: Run Database Migration
      run: |
        echo "Running artisan migrate on server..."
        sleep 2
        TOKEN="${{ secrets.MIGRATE_SECRET }}"
        if [ -z "$TOKEN" ]; then TOKEN="default_secret_token_123"; fi
        RESPONSE=$(curl -s -k -L --max-time 60 \
          "https://finance.berkahsinergigemilang.com/migrate_runner.php?token=${TOKEN}")
        echo "Migration response: $RESPONSE"

    - name: Clear Cache Endpoint
      run: |
        echo "Clearing cache via endpoint..."
        curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/clear-cache
        echo "✅ Deployment finished!"
