name: Deploy Website using FTP (ZIP Method)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, zip

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Prepare Zip, Unzip Script, and Migrate Runner
      run: |
        # ── unzip.php (project root) ──────────────────────────────────
        cat << 'PHPEOF' > unzip.php
<?php
$zipFile = __DIR__ . '/project.zip';
if (file_exists($zipFile)) {
    $zip = new ZipArchive;
    if ($zip->open($zipFile) === TRUE) {
        // Extract & overwrite existing files
        for ($i = 0; $i < $zip->numFiles; $i++) {
            $filename = $zip->getNameIndex($i);
            $target = __DIR__ . '/' . $filename;
            if (substr($filename, -1) !== '/') {
                if (file_exists($target)) {
                    @chmod($target, 0666);
                    @unlink($target);
                }
            }
        }
        $zip->extractTo(__DIR__);
        $zip->close();
        echo 'SUCCESS';
        @unlink($zipFile);
    } else {
        echo 'ERROR: Failed to open zip';
    }
} else {
    echo 'ERROR: Zip file not found';
}
@unlink(__FILE__);
if (file_exists(__DIR__ . '/public/unzip.php')) {
    @unlink(__DIR__ . '/public/unzip.php');
}
PHPEOF

        # ── public/unzip.php ──────────────────────────────────────────
        mkdir -p public
        cat << 'PHPEOF' > public/unzip.php
<?php
$zipFile = __DIR__ . '/../project.zip';
if (file_exists($zipFile)) {
    $zip = new ZipArchive;
    if ($zip->open($zipFile) === TRUE) {
        for ($i = 0; $i < $zip->numFiles; $i++) {
            $filename = $zip->getNameIndex($i);
            $target = __DIR__ . '/../' . $filename;
            if (substr($filename, -1) !== '/') {
                if (file_exists($target)) {
                    @chmod($target, 0666);
                    @unlink($target);
                }
            }
        }
        $zip->extractTo(__DIR__ . '/../');
        $zip->close();
        echo 'SUCCESS';
        @unlink($zipFile);
    } else {
        echo 'ERROR: Failed to open zip';
    }
} else {
    echo 'ERROR: Zip file not found';
}
@unlink(__FILE__);
if (file_exists(__DIR__ . '/../unzip.php')) {
    @unlink(__DIR__ . '/../unzip.php');
}
PHPEOF

        # ── public/migrate_runner.php ─────────────────────────────────
        MIGRATE_TOKEN="${{ secrets.MIGRATE_SECRET }}"
        cat << PHPEOF > public/migrate_runner.php
<?php
\$token = \$_GET['token'] ?? '';
if (\$token !== '${MIGRATE_TOKEN}') {
    http_response_code(403);
    echo 'FORBIDDEN';
    exit;
}
\$root = __DIR__ . '/..';
\$out  = shell_exec("cd {\$root} && php artisan migrate --force 2>&1");
echo "MIGRATE OUTPUT:\n" . \$out;
@unlink(__FILE__);
PHPEOF

        # ── Create ZIP (exclude dev-only files) ───────────────────────
        zip -r project.zip . \
          -x ".git*" \
          -x ".github*" \
          -x "node_modules/*" \
          -x "tests/*" \
          -x "phpunit.xml" \
          -x "vite.config.js" \
          -x "package.json" \
          -x "package-lock.json"

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Upload ZIP + Scripts via FTP
      run: |
        lftp -e "
          set ssl:verify-certificate no;
          open ${{ secrets.FTP_SERVER }};
          user ${{ secrets.FTP_USERNAME }} '${{ secrets.FTP_PASSWORD }}';
          mkdir -p domains/berkahsinergigemilang.com/public_html/finance/public;
          put -O domains/berkahsinergigemilang.com/public_html/finance/ project.zip;
          put -O domains/berkahsinergigemilang.com/public_html/finance/ unzip.php;
          put -O domains/berkahsinergigemilang.com/public_html/finance/public/ public/unzip.php;
          put -O domains/berkahsinergigemilang.com/public_html/finance/public/ public/migrate_runner.php;
          quit"

    - name: Execute Unzip on Server
      run: |
        echo "Running unzip on server..."
        RESPONSE=$(curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/unzip.php)
        if [ "$RESPONSE" != "SUCCESS" ]; then
          echo "Root URL failed ($RESPONSE), trying public/unzip.php..."
          RESPONSE=$(curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/public/unzip.php)
        fi
        echo "Unzip response: $RESPONSE"
        if [ "$RESPONSE" = "SUCCESS" ]; then
          echo "✅ Unzip successful!"
        else
          echo "❌ Unzip failed: $RESPONSE"
          exit 1
        fi

    - name: Run Database Migration (php artisan migrate)
      run: |
        echo "Running artisan migrate on server..."
        sleep 3
        RESPONSE=$(curl -s -k -L --max-time 120 \
          "https://finance.berkahsinergigemilang.com/migrate_runner.php?token=${{ secrets.MIGRATE_SECRET }}")
        echo "Migration output:"
        echo "$RESPONSE"
        if echo "$RESPONSE" | grep -q "MIGRATE OUTPUT"; then
          echo "✅ Migration completed!"
        else
          echo "⚠️  Warning: Migration response unexpected."
        fi

    - name: Clear Laravel Cache on Server
      run: |
        echo "Clearing Laravel view and application cache on server..."
        RESPONSE=$(curl -s -k -L --max-time 30 https://finance.berkahsinergigemilang.com/clear-cache)
        echo "Clear cache response: $RESPONSE"
        echo "✅ Deployment fully completed!"
